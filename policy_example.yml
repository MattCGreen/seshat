policy_example.yml
version: 1.0
last_updated: "2026-03-12"
maintainer: matthew.green

_defaults:
  scope: &hiring_scope
    applies_to: hiring-decisions
    jurisdictions:
      - EU
      - US

rules:
  - rule_id: POL-001
    name: prohibit-autonomous-hiring
    severity: high
    enabled: true
    rationale: |
      Autonomous hiring decisions violate EU AI Act Article 22.
      Human oversight is required for consequential decisions affecting individuals.
    scope: *hiring_scope

  # Ensures human oversight on all hiring decisions.
  - rule_id: POL-002
    name: require-human-review-for-hiring
    severity: medium
    enabled: false
    scope: *hiring_scope

 - rule_id: POL-003
    name: audit-log-retention
    severity: low
    enabled: true
    retention_months: 24
    rationale: |
      Audit logs must be retained for at least 24 months per EU AI Act compliance requirements.
    scope:
      applies_to: audit-logs
      jurisdictions:
        - EU
        - US
        - UK